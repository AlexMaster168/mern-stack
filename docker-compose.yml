# Поднимает всё одной командой: docker compose up --build
# Открыть: http://localhost:5000  (фронт и API на одном порту)
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/edulink
      # ОБЯЗАТЕЛЬНО задай свой секрет в .env рядом с compose (см. README)
      JWT_SECRET: ${JWT_SECRET:-please_change_this_to_a_long_random_string}
      JWT_ACCESS_TTL_MIN: 15
      REFRESH_TTL_DAYS: 7
      # Всё на одном порту — фронт отдаётся бэком, поэтому APP_BASE_URL == CLIENT_URL
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:5000}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5000}
      CLIENT_DIST_DIR: /app/client/dist
    ports:
      - '5000:5000'
    volumes:
      - uploads:/app/uploads

volumes:
  mongo-data:
  uploads:
